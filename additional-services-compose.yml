 
services:

  #####################################
  ## KEYCLOAK WEBHOOK #################
  #####################################
  keycloak-webhook:
    build:
      context: ./[ads]/maya-keycloak-webhook

    ports:
      - "${KEYCLOAK_WEBHOOK_PORT:-8099}:8000"

    environment:
      # Conexión RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBIT_PORT}
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASSWORD=${RABBITMQ_DEFAULT_PASSWORD}
      - RABBITMQ_VHOST=${RABBITMQ_KEYCLOAK_VHOST:-maya_sync}
      - RABBITMQ_EXCHANGE=${RABBITMQ_KEYCLOAK_EXCHANGE:-ex.keycloak.events}
      # Secreto compartido con Keycloak para autenticar las llamadas
      - KEYCLOAK_WEBHOOK_SECRET=${KEYCLOAK_WEBHOOK_SECRET}
      # Nivel de log: INFO en producción, DEBUG para ver payloads completos
      - LOG_LEVEL=${KEYCLOAK_WEBHOOK_LOG_LEVEL:-INFO}

    depends_on:
      - rabbitmq
      - keycloak

    restart: unless-stopped

    networks:
      - traefik_network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak-webhook.rule=Host(`keycloak-webhook.local`)"
      - "traefik.http.routers.keycloak-webhook.entrypoints=web"
      - "traefik.http.services.keycloak-webhook.loadbalancer.server.port=8000"
      
      
  #####################################
  ## USER_WORKER #################
  #####################################
  user-worker:
    build:
      context: ./[ads]/maya-odoo-workers
    
    restart: unless-stopped
    
    environment:
      - RABBITMQ_HOST=${RABBIT_HOST}
      - RABBITMQ_PORT=${RABBIT_PORT}
      - ODOO_URL=${ODOO_URL}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USER=${USER_WORKER_ODOO}
      - ODOO_PASSWORD=${USER_WORKER_ODOO_PASSWORD}
      - QUEUE_NAME=${USER_WORKER_QUEUE_NAME}    
      - RABBITMQ_USER=${USER_WORKER_RABBIT_USER}
      - RABBITMQ_PASS=${USER_WORKER_RABBIT_PASS}
      - RABBITMQ_VHOST=${USER_WORKER_RABBITMQ_VHOST}

    depends_on:
      - web
      - rabbitmq
        
    networks:
      - traefik_network
